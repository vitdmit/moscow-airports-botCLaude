name: Бэкфилл DME (снапшоты, все аэропорты)
# Ретроактивно дополняет CSV в data/daily/ рейсами и гейтами из снапшотов
# табло по SVO/VKO/DME и рейсами DME из Яндекс.Расписания.
# Бюджет AeroDataBox НЕ расходуется.
# Запускать вручную: Actions → этот workflow → Run workflow.

on:
  workflow_dispatch:
    inputs:
      month:
        description: 'Месяц YYYY-MM (пусто = прошлый месяц)'
        required: false
        default: ''
      from_date:
        description: 'От YYYY-MM-DD (опционально, приоритет над month)'
        required: false
        default: ''
      to_date:
        description: 'До YYYY-MM-DD (используется вместе с from_date)'
        required: false
        default: ''

# Сериализуем с дневным сбором (daily.yml) — общая группа записи в data/,
# чтобы бэкфилл и дневной сбор не пушили одновременно и не роняли друг друга.
concurrency:
  group: airports-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install httpx

      - name: Run backfill
        env:
          BACKFILL_MONTH: ${{ github.event.inputs.month }}
          BACKFILL_FROM:  ${{ github.event.inputs.from_date }}
          BACKFILL_TO:    ${{ github.event.inputs.to_date }}
        run: python scripts/backfill_dme.py

      - name: Commit updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily
          if git diff --cached --quiet; then
            echo "Нет изменений — коммит не нужен."
            exit 0
          fi
          git commit -m "backfill: добор из снапшотов за ${{ github.event.inputs.month || github.event.inputs.from_date || 'прошлый месяц' }}"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "push retry $i…"
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after 3 retries" >&2
          exit 1
