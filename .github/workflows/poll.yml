name: Poll airports

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: airports-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run poller
        run: python -m src.poll

      - name: Commit snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new snapshots to commit."
            exit 0
          fi
          git commit -m "poll: snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push retry $i…"
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after 3 retries" >&2
          exit 1
