name: Poll airports

# Запуск каждые 10 минут + ручной запуск.
# Время в cron — UTC. MSK = UTC+3.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# Не запускать параллельно — иначе git push конфликтует сам с собой.
concurrency:
  group: airports-write
  cancel-in-progress: false

permissions:
  contents: write   # нужно, чтобы воркфлоу мог коммитить data/ обратно

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run poller
        run: python -m src.poll

      - name: Commit snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Если ничего не изменилось — выходим спокойно.
          if git diff --quiet --exit-code data/; then
            echo "No new snapshots to commit."
            exit 0
          fi
          git add data/
          git commit -m "poll: snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          # На случай гонки с другим запуском.
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "push retry $i…"
            sleep $((RANDOM % 5 + 2))
          done
          echo "push failed after 3 retries" >&2
          exit 1
