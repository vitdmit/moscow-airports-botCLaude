name: Снимки табло DME / VKO / SVO (гейты)

# Каждые 10 минут снимает живое табло Яндекса по всем трём аэропортам:
#   DME → data/gate_snapshots/         (основной, используется для gate enrichment)
#   VKO → data/gate_snapshots_vko/     (контроль, сравнение с ADB)
#   SVO → data/gate_snapshots_svo/     (контроль, сравнение с ADB)
#
# Переход через полночь обрабатывается автоматически: рейсы 00–06 ч,
# видимые на ночном табло после 20:00, пишутся в снапшот следующего дня.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# Параллельные запуски ставятся в очередь, не отменяются
concurrency:
  group: gate-snapshots
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install httpx

      - name: Snapshot all boards
        run: |
          python -m src.yandex_board DME
          python -m src.yandex_board VKO
          python -m src.yandex_board SVO

      - name: Commit snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gate_snapshots/ || true
          git add data/gate_snapshots_vko/ || true
          git add data/gate_snapshots_svo/ || true
          git commit -m "snapshot: гейты DME/VKO/SVO $(date -u +'%Y-%m-%dT%H:%M')" \
            || echo "нет изменений"
          for i in 1 2 3 4 5; do
            git push && break || (git pull --rebase && sleep 3)
          done
